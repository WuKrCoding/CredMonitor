version: '3.8'

services:
  credmonitor:
    build: .
    container_name: credmonitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/credmonitor.db
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=${DEBUG:-False}
